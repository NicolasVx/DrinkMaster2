<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drink Master – Treino Manual CB</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f2027;
            color: #fff
        }

        header {
            padding: 16px;
            text-align: center;
            background: #1c3b4a
        }

        main {
            padding: 16px;
            max-width: 600px;
            margin: auto
        }

        #drinkName {
            font-size: 24px;
            margin-bottom: 10px;
            text-align: center;
            color: #ffab00;
            font-weight: bold
        }

        #score {
            font-size: 18px;
            text-align: center;
            margin-bottom: 10px
        }

        .ingredients,
        .glass {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px
        }

        .ingredient {
            background: #fff;
            color: #000;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s
        }

        .ingredient:active {
            transform: scale(0.9)
        }

        .glass {
            min-height: 100px;
            border: 2px dashed #fff;
            border-radius: 12px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05)
        }

        .glass-item {
            background: rgba(255, 255, 255, 0.2);
            padding: 6px 10px;
            border-radius: 12px;
            font-size: 13px
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold
        }

        .check {
            background: #4caf50;
            color: #fff
        }

        .next {
            background: #2196f3;
            color: #fff
        }

        .reset {
            background: #f44336;
            color: #fff
        }

        #result {
            text-align: left;
            margin-top: 15px;
            font-size: 16px;
            line-height: 1.5;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 8px
        }

        .missing {
            color: #ffeb3b
        }

        .wrong {
            color: #ff5252
        }

        .success {
            color: #4caf50;
            text-align: center;
            display: block
        }
    </style>
</head>

<body>
    <header>
        <h1>🍸 Drink Master</h1>
        <p>Treino Baseado no Manual V.9</p>
    </header>
    <main>
        <div id="score">Pontos: 0</div>
        <div id="drinkName"></div>
        <div class="ingredients" id="ingredients"></div>
        <h3>Na Taça / Copo</h3>
        <div class="glass" id="glass"></div>
        <button class="check" onclick="checkDrink()">Conferir Receita</button>
        <button class="reset" onclick="resetGlass()">Refazer</button>
        <button class="next" onclick="nextDrink()">Próximo Drink</button>
        <div id="result"></div>
    </main>

    <script>
        // === BANCO DE DADOS ATUALIZADO PELO MANUAL V.9 ===
        const drinks = [
            { name: 'Acerola Martini', recipe: ['50ml Vodka Ketel One', '50ml Polpa Acerola', '25ml Sumo Maracujá', '20ml Licor Chambord/Massenez', '15ml Suco Limão Siciliano', '50ml Syrup', '01 Fatia Laranja Caramelizada Seca', 'Gelo'] },
            { name: 'Alexander', recipe: ['40ml Conhaque ', '35ml Creme de Cacau', '30ml Creme de Leite', '10ml Leite Condensado', 'Gelo'] },
            { name: 'Apple Gin Sem Álcool', recipe: ['50ml de Xarope Maça Verde', '200ml Água Tônica', '01 Lque de Maça Verde', 'Gelo'] },
            { name: 'Moscow Mule', recipe: ['50ml Vodka', '20ml Suco de Limão', '20ml Syrup', 'Gelo', 'Espuma de Gengibre', 'Angostura'] },
            { name: 'Negroni', recipe: ['50ml Gin', '40ml Campari', '35ml Vermute Punt e Mes', 'Angostura', 'Gelo', 'Casca de Laranja'] },
            { name: 'Dry Martini', recipe: ['75ml Gin', '15ml Vermute Carpano Dry', 'Azeitona', 'Gelo'] },
            { name: 'Apple Martini', recipe: ['50ml Vodka', '20ml Xarope Maçã Verde', 'Rodela de Maçã Verde', 'Gotas de Limão-Taiti', 'Gelo'] },
            { name: 'Blue Martini', recipe: ['50ml Vodka', '20ml Curaçau Blue', '15ml Suco de Limão', 'Gelo'] },
            { name: 'Cosmopolitan', recipe: ['40ml Vodka', '40ml Licor de Laranja', '20ml Suco de Limão', '60ml Suco de Cranberry', 'Casca de Laranja'] },
            { name: 'Manhattan', recipe: ['60ml Whiskey', '35ml Vermute Rosso', 'Angostura', 'Cereja', 'Gelo'] },
            { name: 'Gin Tônica', recipe: ['50ml Gin', 'Água Tônica', 'Gelo', 'Limão Siciliano', 'Zimbro', 'Alecrim', 'Pepino', 'Casca de Laranja com Logo'] },
            { name: 'Gin Tônica Frutas Vermelhas', recipe: ['50ml Gin', 'Água Tônica', 'Morango', 'Blueberry', 'Framboesa', '15ml Syrup', 'Gelo', 'Casca de Laranja com Logo'] },
            { name: 'Gin Blush', recipe: ['50ml Gin', 'Suco de Cranberry', 'Suco de Limão', 'Água Tônica', 'Gelo', 'Casca de Laranja com Logo'] },
            { name: 'Gin Triple T', recipe: ['50ml Gin', 'Água Tônica', 'Tangerina', 'Mel', 'Gelo', 'Casca de Laranja com Logo'] },
            { name: 'Gin de Caju', recipe: ['50ml Gin', 'Água Tônica', 'Caju', 'Adoçante', 'Castanha de Caju', 'Gelo'] },
            { name: 'Gin Citrus', recipe: ['50ml Gin', 'Schweppes Citrus', 'Limão-Taiti', 'Zimbro', 'Gelo'] }, { name: 'Gin Citrus', recipe: ['50ml Gin', 'Schweppes Citrus', 'Limão-Taiti', 'Zimbro', 'Gelo'] }, { name: 'Gin Citrus', recipe: ['50ml Gin', 'Schweppes Citrus', 'Limão-Taiti', 'Zimbro', 'Gelo'] },
            { name: 'Gin Hibiscus', recipe: ['50ml Gin', 'Água Tônica', 'Laranja', 'Flor de Hibisco', 'Gelo'] },
            { name: 'Gin Sevilla', recipe: ['50ml Gin Sevilla', 'Água Tônica', 'Suco de Tangerina', 'Fatia de Tangerina', 'Gelo', 'Casca de Laranja com Logo'] },
            { name: 'Gin Siciliano', recipe: ['50ml Gin', '20ml Purê de Morango', '20ml Limoncello', 'Espuma de Gengibre', 'Raspas de Limão Siciliano', '03 Morangos Fatiados', 'Gelo'] },
            { name: 'Gin Mule', recipe: ['50ml Gin', 'Água Tônica', 'Espuma de Gengibre', 'Hortelã', 'Gelo'] },
            { name: 'Gin Lichia', recipe: ['50ml Gin', '20ml Licor de Lichia', '20ml Purê de Lichia', 'Água Tônica', '04 Folhas de Hortelã', '01 Rodela de Limão Siciliano', 'Gelo'] },
            { name: 'Carajillo', recipe: ['50ml Licor 43', 'Café Espresso', 'Gelo'] },
            { name: 'Lichia Martini', recipe: ['50ml Vodka', '50ml Água de Coco', '20ml Purê de Lichia', '10ml Suco de Limão', '15ml Syrup', '01 Lichia no Palito', 'Gelo'] },
            { name: 'Passion Martini', recipe: ['50ml Vodka', '20ml Xarope de Maracujá', '05 Folhas de Manjericão', 'Gelo'] },
            { name: 'Aperol Spritz', recipe: ['120ml Espumante', '80ml Aperol', '40ml Água com Gás', 'Rodela de Laranja', 'Gelo'] },
            { name: 'Clericot', recipe: ['Vinho Branco', '20ml Licor de Laranja', '20ml Conhaque', 'Soda', 'Frutas Picadas', 'Gelo'] },
            { name: 'French Martini', recipe: ['50ml Vodka', '20ml Licor Chambord', '60ml Suco de Abacaxi', '15ml Syrup', 'Folha de Abacaxi', 'Gelo'] },
            { name: 'Taça de Sangria', recipe: ['Vinho Tinto', 'Soda', '20ml Licor de Laranja', 'Suco de Laranja', 'Frutas Picadas', '02 colheres de açúcar', 'Gelo'] },
            { name: 'Marguerita', recipe: ['50ml Tequila', '20ml Licor de Laranja', 'Suco de Limão', 'Sal na borda', 'Gelo'] },
            { name: 'Piña Colada', recipe: ['50ml Rum', '60ml Suco de Abacaxi', '30ml Leite de Coco', '30ml Leite Condensado', 'Xarope de Groselha', 'Gelo'] },
            { name: 'Cozumel', recipe: ['Suco de 1 Limão', 'Sal na borda', '01 Chopp', 'Gelo'] },
            { name: 'Mojito', recipe: ['50ml Rum', '10 Folhas de Hortelã', '02 colheres de açúcar', 'Suco de Limão', 'Soda', 'Gelo'] },
            { name: 'Bloody Mary', recipe: ['50ml Vodka', 'Suco de Tomate', 'Suco de Limão', 'Molho Inglês', 'Tabasco', 'Sal e Pimenta', 'Gelo'] },
            { name: 'Sex on the Beach', recipe: ['50ml Vodka', '20ml Licor de Pêssego', 'Suco de Laranja', 'Grenadine', 'Gelo'] },
            { name: 'Mimosa', recipe: ['Suco de Laranja', 'Espumante'] },
            { name: 'Kir Royal', recipe: ['Espumante', 'Creme de Cassis', 'Cereja'] },
            { name: 'Bellini', recipe: ['60ml Purê de Pêssego', 'Espumante'] },
            { name: 'Espresso Martini', recipe: ['Café Espresso', '50ml Vodka', '20ml Frangelico', '15ml Xarope de Baunilha', '03 Grãos de Café', 'Gelo'] }
        ];

        let index = 0, score = 0, selected = [];
        const drinkName = document.getElementById('drinkName');
        const ingredientsDiv = document.getElementById('ingredients');
        const glassDiv = document.getElementById('glass');
        const resultDiv = document.getElementById('result');
        const scoreDiv = document.getElementById('score');

        function loadDrink() {
            selected = [];
            glassDiv.innerHTML = '';
            resultDiv.innerHTML = '';
            const d = drinks[index];
            drinkName.innerText = d.name;
            ingredientsDiv.innerHTML = '';

            // Embaralha os corretos com um errado genérico para o treino
            let opts = [...d.recipe, 'Açúcar Cristal', 'Sake', 'Hortelã (Decoração)', 'Canudo'];
            opts.sort(() => Math.random() - 0.5).forEach(i => {
                let b = document.createElement('div');
                b.className = 'ingredient';
                b.innerText = i;
                b.onclick = () => add(i);
                ingredientsDiv.appendChild(b);
            });
        }

        function add(i) {
            if (selected.includes(i)) return;
            selected.push(i);
            let d = document.createElement('div');
            d.className = 'glass-item';
            d.innerText = i;
            glassDiv.appendChild(d);
        }

        function checkDrink() {
            let r = drinks[index].recipe;
            let missing = [];
            let wrong = [];

            // Apenas o que está no PDF mas você não selecionou
            r.forEach(i => {
                if (!selected.includes(i)) missing.push(i);
            });

            // O que você selecionou mas NÃO está no PDF
            selected.forEach(i => {
                if (!r.includes(i)) wrong.push(i);
            });

            let acertos = r.length - missing.length;
            let p = (acertos * 10) - (wrong.length * 5);
            if (p < 0) p = 0;
            score += p;
            scoreDiv.innerText = 'Pontos: ' + score;

            let msg = `<strong>Acertos: ${acertos}/${r.length}</strong><br>`;

            if (missing.length > 0) {
                msg += `<span class="missing">⚠️ Faltou no Drink:</span> ${missing.join(', ')}<br>`;
            }
            if (wrong.length > 0) {
                msg += `<span class="wrong">❌ Não vai na receita:</span> ${wrong.join(', ')}<br>`;
            }
            if (missing.length === 0 && wrong.length === 0) {
                msg = `<span class="success">⭐ PERFEITO! Receita padrão V.9 realizada com sucesso.</span>`;
            }

            resultDiv.innerHTML = msg;
        }

        function resetGlass() { selected = []; glassDiv.innerHTML = ''; resultDiv.innerHTML = '' }
        function nextDrink() { if (index < drinks.length - 1) { index++; loadDrink() } else { resultDiv.innerText = 'Fim do treino. Pontos finais: ' + score } }

        loadDrink();
    </script>
</body>
